<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Sync Receiver</title>
    <style>
        body { font-family: sans-serif; padding: 30px; text-align: center; background: #fafafa; }
        input { padding: 12px; font-size: 18px; width: 120px; text-align: center; border: 2px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; }
        button { padding: 12px 24px; font-size: 16px; background: #059669; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Phone B: Receive Config</h2>
    <p>Enter the 4-digit PIN showing on Phone A's screen:</p>
    
    <input type="number" id="pinInput" placeholder="0000" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">
    <br>
    <button id="connectBtn">📡 Connect & Sync</button>
    
    <h3 id="status" style="margin-top:20px; color:#4b5563;">Awaiting input...</h3>

    <script>
        document.getElementById('connectBtn').addEventListener('click', () => {
            const pin = document.getElementById('pinInput').value;
            const statusDiv = document.getElementById('status');

            if (pin.length !== 4) {
                statusDiv.innerText = "❌ Please enter a valid 4-digit PIN.";
                return;
            }

            statusDiv.innerText = "Connecting to Phone A...";
            const ws = new WebSocket(`wss://free.websocket.me/v1/pwa-sync-${pin}`);

            ws.onopen = () => {
                // Signal Phone A that we are connected and listening
                ws.send("REQUEST_DATA");
            };

            ws.onmessage = (event) => {
                try {
                    const incomingData = JSON.parse(event.data);
                    
                    // Clear out target phone storage and copy local keys over natively
                    localStorage.clear();
                    Object.keys(incomingData).forEach(key => {
                        localStorage.setItem(key, incomingData[key]);
                    });

                    statusDiv.style.color = "#059669";
                    statusDiv.innerHTML = "✅ LocalStorage Synced Successfully!<br><br>You can now open your main EcoFlow application.";
                    ws.close();
                } catch (e) {
                    statusDiv.innerText = "❌ Sync payload processing failed.";
                }
            };

            ws.onerror = () => {
                statusDiv.innerText = "❌ Connection failed. Check the PIN or internet access.";
            };
        });
    </script>
</body>
</html>
